<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Cadastro Confirmado! - Passo Final</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        .obrigado-container {
            text-align: center;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        .icon-success {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .obrigado-container h1 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 2.2rem;
        }
        .obrigado-container p {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 30px;
        }
        .btn-whatsapp {
            background-color: #25D366; /* Verde oficial do WhatsApp */
            color: white;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            display: inline-block;
            transition: background-color 0.3s ease;
            width: 100%;
        }
        .btn-whatsapp:hover {
            background-color: #1ebe57;
        }
    </style>
</head>
<body>

    <main class="obrigado-container">
        <div class="icon-success">✅</div>
        <h1>Quase lá, falta só um detalhe!</h1>
        <p>Seu cadastro para a Live sobre Menopausa foi reservado com sucesso. Para não perder o link de acesso no dia, clique no botão abaixo e entre no nosso Grupo VIP do WhatsApp.</p>
        
        <a href="https://chat.whatsapp.com/seu-link-ficticio-aqui" class="btn-whatsapp" target="_blank">
            Entrar no Grupo Oficial
        </a>
    </main>

</body>
</html>
